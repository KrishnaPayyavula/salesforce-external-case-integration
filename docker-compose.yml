version: '3.8'

services:
  salesforce-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salesforce-external-case-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - DEBUG=false
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - salesforce-network

  # Optional: Add nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: salesforce-api-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - salesforce-api
    restart: unless-stopped
    networks:
      - salesforce-network
    profiles:
      - production

networks:
  salesforce-network:
    driver: bridge

volumes:
  logs:
    driver: local
